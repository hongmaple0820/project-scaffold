# SCALE Engine Configuration
# Profile: Standard — Guardrails + lint + test verification. Recommended for most projects.
# Customize below, or change profile with: scale config profile <id>

version: 1
profile: standard

project:
  name: .

storage:
  db: .scale/scale.db
  events: .scale/events
  artifacts: .scale/artifacts

agents:
  - name: claude-code

guardrails:
  preTool:
    enabled: true
    detectors:
      - dangerous-command
      - role-permission
      - brute-retry
      - premature-done
  postTool:
    enabled: true
    autoLint:
      enabled: true
  beforeStop:
    enabled: true
    requireVerification: true

logging:
  level: info
  file: .scale/scale.log