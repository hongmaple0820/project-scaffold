name: SCALE Preflight

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - dev
      - main
      - master

permissions:
  contents: read

concurrency:
  group: scale-preflight-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install project dependencies when present
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi

      - name: Run SCALE preflight
        run: npx --yes @hongmaple0820/scale-engine@0.50.11 preflight --service all --preflight-profile quick
